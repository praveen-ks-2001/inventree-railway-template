server {
    listen 8080 default_server;
    server_name _;

    client_max_body_size 100M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Static files (CSS, JS, images) — served from local disk by InvenTree's collectstatic
    location /static/ {
        alias /home/inventree/data/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Media files (user uploads, generated reports/labels)
    location /media/ {
        alias /home/inventree/data/media/;
        expires 7d;
        access_log off;
    }

    # Everything else proxied to gunicorn on localhost:8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
